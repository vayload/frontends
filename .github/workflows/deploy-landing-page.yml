name: Deploy Landing to Cloudflare Pages

on:
    push:
        branches: ['main']
        paths:
            - 'apps/landing/**'
    pull_request:
        branches: ['main']
        paths:
            - 'apps/landing/**'

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        name: Build and Deploy Landing

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'pnpm'

            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build:landing

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_VL_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy apps/landing/dist --project-name=vayload-landing
